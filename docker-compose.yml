services:
  app:
    build:
      context: .
      args:
        OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1}
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: http://127.0.0.1:11434
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    stdin_open: true
    tty: true

volumes:
  ollama_data:
